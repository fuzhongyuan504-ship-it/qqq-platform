name = "qqq-platform"
main = "index.js"
compatibility_date = "2024-01-01"

# After: wrangler kv:namespace create "QQQ_KV"
# paste the returned id below
[[kv_namespaces]]
binding = "KV"
id = "PASTE_KV_ID_HERE"

# Secrets — set with CLI, never written in this file:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_PRICE_ID
#   wrangler secret put GITHUB_PAGES_DOMAIN   ← e.g. username.github.io
